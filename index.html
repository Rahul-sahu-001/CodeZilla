<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WeilMarket — The On-Chain Applet Marketplace on WeilChain. Discover, deploy, and invoke intelligent applets." />
    <meta name="theme-color" content="#010104" />

    <title>WeilMarket | On-Chain Applet Marketplace</title>

    <!-- ★ NEW FONTS: Syne + Manrope + Space Mono ★ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600;700;800&family=Manrope:wght@200;300;400;500;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ── INSTANT DARK BG to prevent white flash ── */
      html, body {
        background-color: #010104;
        margin: 0; padding: 0;
        font-family: 'Manrope', sans-serif;
      }
      /* Loading screen */
      #loading-screen {
        position: fixed; inset: 0;
        background: #010104;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #loading-screen.hidden {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      .loader-logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 28px;
        letter-spacing: 0.12em;
        background: linear-gradient(90deg, #a07830, #d4a853, #f0c87a, #d4a853, #a07830);
        background-size: 300% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: shimmer 2s linear infinite;
        margin-bottom: 24px;
      }
      .loader-bar-wrap {
        width: 160px; height: 2px;
        background: rgba(212,168,83,0.15);
        border-radius: 2px; overflow: hidden;
      }
      .loader-bar {
        height: 100%;
        background: linear-gradient(90deg, #a07830, #f0c87a);
        border-radius: 2px;
        animation: loadBar 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      .loader-sub {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        color: rgba(212,168,83,0.5);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin-top: 14px;
        animation: blink 1.4s ease-in-out infinite;
      }
      @keyframes shimmer {
        0%   { background-position: -300% center; }
        100% { background-position:  300% center; }
      }
      @keyframes loadBar {
        from { width: 0%; }
        to   { width: 100%; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.3; }
      }
    </style>
  </head>

  <body>

    <!-- ★ LOADING SCREEN ★ -->
    <div id="loading-screen">
      <div class="loader-logo">WEILMARKET</div>
      <div class="loader-bar-wrap">
        <div class="loader-bar"></div>
      </div>
      <div class="loader-sub">Connecting to WeilChain...</div>
    </div>

    <!-- React App -->
    <div id="root"></div>

    <!-- Hide loader after app loads -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var s = document.getElementById('loading-screen')
          if (s) s.classList.add('hidden')
        }, 1400)
      })
    </script>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
